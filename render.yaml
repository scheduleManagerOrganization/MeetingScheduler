services:
  - type: web
    name: meeting-scheduler-csharp
    runtime: dotnet
    repo: https://github.com/본인아이디/meeting-scheduler-csharp
    plan: free
    buildCommand: dotnet restore && dotnet build
    startCommand: dotnet run --urls=http://0.0.0.0:$PORT
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
