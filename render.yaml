services:
  - type: web
    name: meeting-scheduler-csharp
    runtime: image
    image:
      url: mcr.microsoft.com/dotnet/sdk:8.0
    buildCommand: dotnet restore && dotnet build
    startCommand: dotnet run --urls=http://0.0.0.0:$PORT
    envVars:
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
